<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Glowzy House</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="admin-container">

    <h1>🛠 Admin Panel</h1>

    <form id="productForm">

      <input type="text" id="name" placeholder="Product Name" required>
      <input type="text" id="price" placeholder="Price (e.g. 2500)" required>
      <input type="text" id="image" placeholder="Image URL (images/basket1.jpg)" required>

      <button type="submit">Add Product</button>

    </form>

  </div>

<script src="admin.js"></script>
</body>
</html>
